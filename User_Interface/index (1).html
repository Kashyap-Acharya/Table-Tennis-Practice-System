<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart TT Trainer Dashboard</title>
    <style>
        /* =========================================
           BASE STYLES & VARIABLES
        ========================================= */
        :root {
            --bg-dark: #050505;
            --panel-bg: rgba(17, 17, 17, 0.85);
            --iitgn-orange: #FF6600;
            --iitgn-blue: #003366;
            --iitgn-blue-glow: #004c99;
            --neon-green: #39ff14;
            --neon-red: #ff073a;
            --text-main: #e0e0e0;
            --grid-line: rgba(255, 102, 0, 0.05);
        }

        body, html {
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            margin: 0; padding: 0;
            width: 100%; height: 100vh;
            /* Allow scrolling if the screen is too small */
            overflow-x: hidden; 
            overflow-y: auto; 
        }

        header {
            position: absolute; top: 25px; left: 30px; z-index: 100;
            display: flex; flex-direction: column;
        }

        h1 { 
            margin: 0; font-size: 2rem; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 4px; color: #fff;
            text-shadow: 0 0 10px rgba(255, 102, 0, 0.3);
        }
        .branding { color: var(--iitgn-orange); }

        #status {
            font-size: 1.1rem; font-weight: 600; margin-top: 5px;
            text-transform: uppercase; letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        /* =========================================
           SCREEN NAVIGATION
        ========================================= */
        .screen {
            display: none; width: 100%; height: 100vh;
            flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* =========================================
           CYBER BUTTON CORE STYLES
        ========================================= */
        .cyber-btn {
            position: relative;
            width: 90%; max-width: 600px;
            padding: 25px; margin: 15px 0;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.8rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 4px;
            background: var(--panel-bg); color: var(--text-main);
            border: 1px solid var(--iitgn-blue);
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            box-shadow: inset 0 0 20px rgba(0, 51, 102, 0.5);
        }

        .cyber-btn::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 5px; height: 100%; background: var(--iitgn-blue-glow);
            transition: width 0.2s ease;
        }

        .cyber-btn:hover { background: rgba(0, 76, 153, 0.2); border-color: var(--iitgn-blue-glow); color: #fff; }
        .cyber-btn:hover::before { width: 10px; }

        /* Danger Buttons */
        .cyber-btn.danger { border-color: var(--neon-red); box-shadow: inset 0 0 20px rgba(255, 7, 58, 0.2); }
        .cyber-btn.danger::before { background: var(--neon-red); }
        .cyber-btn.danger:hover { background: rgba(255, 7, 58, 0.15); }

        /* Emergency Override */
        .cyber-btn.emergency {
            background: rgba(255, 0, 0, 0.8); color: white; border: none;
            text-shadow: 0 0 5px #fff; box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            animation: pulseBg 1.5s infinite;
        }
        .cyber-btn.emergency::before { display: none; }

        @keyframes pulseBg { 0% { box-shadow: 0 0 20px rgba(255,0,0,0.4); } 50% { box-shadow: 0 0 40px rgba(255,0,0,0.8); } 100% { box-shadow: 0 0 20px rgba(255,0,0,0.4); } }

        /* =========================================
           MAIN MENU GRID
        ========================================= */
        .mode-title {
            font-size: 2.2rem; 
            color: #fff; 
            text-transform: uppercase; 
            letter-spacing: 4px;
            margin-bottom: 40px; 
            text-shadow: 0 0 15px var(--iitgn-blue-glow);
        }

        .mode-grid {
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 25px;
            width: 90%; 
            max-width: 800px; 
            margin-bottom: 25px;
        }

        .mode-btn {
            margin: 0; 
            font-size: 1.6rem;
            width: 100%;
        }

        .mode-btn.normal { border-color: var(--iitgn-blue); }

        .mode-btn.spin { 
            border-color: var(--iitgn-orange); 
            box-shadow: inset 0 0 20px rgba(255, 102, 0, 0.15); 
        }
        .mode-btn.spin::before { background: var(--iitgn-orange); }
        .mode-btn.spin:hover { background: rgba(255, 102, 0, 0.15); border-color: var(--iitgn-orange); }

        .mode-btn.random {
            width: 90%; max-width: 800px;
            border-color: #b026ff; 
            box-shadow: inset 0 0 20px rgba(176, 38, 255, 0.15);
        }
        .mode-btn.random::before { background: #b026ff; }
        .mode-btn.random:hover { background: rgba(176, 38, 255, 0.15); border-color: #b026ff; }

        /* =========================================
           MINIMAL ACTIVE SCREEN
        ========================================= */
        .active-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px; /* Tamed spacing */
            position: relative;
        }

        #active-drill-text {
            font-size: 3rem;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 6px;
            margin: 0;
            text-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
            z-index: 2;
        }

        .processing-text {
            font-size: 1.2rem;
            color: var(--iitgn-orange);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 10px;
            animation: blink 1.5s infinite;
        }

        .pulse-ring {
            position: absolute;
            width: 180px; /* Tamed size */
            height: 180px; /* Tamed size */
            border: 2px solid var(--neon-green);
            border-radius: 50%;
            animation: radarPulse 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
            z-index: 1;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes radarPulse { 
            0% { transform: scale(0.8); opacity: 0; } 
            50% { opacity: 0.3; } 
            100% { transform: scale(1.5); opacity: 0; } 
        }

        #active-controls {
            display: flex; gap: 20px; margin-bottom: 30px; width: 100%; max-width: 800px;
            justify-content: center; /* Center the buttons */
        }

        /* Shrink controls specifically on the active screen to save space */
        #active-controls .cyber-btn {
            padding: 15px;       
            font-size: 1.2rem;   
            margin: 5px 0;
            width: auto; /* Let buttons size dynamically */
            flex: 1;
        }

        /* =========================================
           SUMMARY SCREEN STATS
        ========================================= */
        .stat-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            width: 90%; max-width: 800px; margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--panel-bg), #000);
            padding: 30px; border-top: 2px solid var(--iitgn-orange);
            text-align: center; position: relative;
        }

        .stat-card::after {
            content: ''; position: absolute; bottom: 0; right: 0;
            width: 20px; height: 20px; border-bottom: 2px solid var(--iitgn-orange); border-right: 2px solid var(--iitgn-orange);
        }

        .stat-val { 
            font-size: 5rem; 
            font-weight: 700;
            color: white;
            font-family: monospace;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .stat-label { 
            font-size: 1.1rem; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-top: 10px;
        }

        #tt-board {
            background: transparent;
            z-index: 10;
            max-height: 45vh; /* Scale the canvas to fit the screen */
            width: auto;      /* Keeps aspect ratio correct */
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <header>
        <h1><span class="branding">IITGN</span> Trainer</h1>
        <div id="status">WS: Disconnected</div>
    </header>

    <div id="screen-level" class="screen active">
        <button class="cyber-btn" onclick="selectLevel('beginner')">Beginner</button>
        <button class="cyber-btn" onclick="selectLevel('intermediate')">Intermediate</button>
        <button class="cyber-btn" onclick="selectLevel('advanced')">Advanced</button>
    </div>

    <div id="screen-sub" class="screen">
        <div id="sub-buttons-container" style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 30px;"></div>
        <button class="cyber-btn danger" style="margin-top: 40px; padding: 20px; font-size: 1.5rem;" onclick="showScreen('screen-level')">Back</button>
    </div>

    <div id="screen-active" class="screen">
        <div class="active-display">
            <div class="pulse-ring"></div>
            <div id="active-drill-text">ACTIVE</div>
            <div class="processing-text">Tracking Systems Online</div>
        </div>

        <canvas id="tt-board" width="610" height="548"></canvas>

        <div id="active-controls">
            <button class="cyber-btn danger" onclick="endDrill()">End & Stats</button>
            <button class="cyber-btn emergency" onclick="emergencyStop()">EMERGENCY STOP (99)</button>
        </div>
    </div>

    <div id="screen-summary" class="screen">
        <h2 class="mode-title">Drill Complete</h2>
        
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-val" id="sum-accuracy">0%</div>
                <div class="stat-label">Hit Accuracy</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="sum-streak">0</div>
                <div class="stat-label">Max Streak</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="sum-vel">0</div>
                <div class="stat-label">Avg Velocity (km/h)</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="sum-total">0</div>
                <div class="stat-label">Total Balls</div>
            </div>
        </div>

        <button class="cyber-btn" onclick="showScreen('screen-level')">Start New Drill</button>
    </div>

    <script>
        const drillData = {
            beginner: [
                { id: 1, name: "Forehand Counter" },
                { id: 2, name: "Backhand Counter" },
                { id: 3, name: "Basic Push" }
            ],
            intermediate: [
                { id: 4, name: "Topspin Drive" },
                { id: 5, name: "Active Block" },
                { id: 6, name: "Pivot Forehand" }
            ],
            advanced: [
                { id: 7, name: "Falkenberg Drill" },
                { id: 8, name: "Random Topspin" },
                { id: 9, name: "Short Touch" }
            ]
        };

        let ws;
        let selectedDrill = null;
        
        let totalShots = 0;
        let successfulHits = 0;
        let currentStreak = 0;
        let maxStreak = 0;
        let backendAccuracy = 0; 
        
        let velocityLog = [];

        const canvas = document.getElementById('tt-board');
        const ctx = canvas.getContext('2d');
        const scale = 0.4; 

        async function syncStatsWithBackend() {
            try {
                const response = await fetch('/api/session');
                if (!response.ok) return; 
                
                const sessionData = await response.json();

                totalShots = sessionData.total_shots || 0;
                successfulHits = sessionData.hit_count || 0;
                currentStreak = sessionData.streak || 0;
                maxStreak = sessionData.best_streak || 0;
                backendAccuracy = sessionData.accuracy || 0; 

                if (sessionData.active && !document.getElementById('screen-active').classList.contains('active')) {
                    showScreen('screen-active');
                }
            } catch (error) {
                console.error("Could not sync with backend:", error);
            }
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function selectLevel(level) {
            const container = document.getElementById('sub-buttons-container');
            container.innerHTML = ""; 
            
            drillData[level].forEach(drill => {
                const btn = document.createElement('button');
                btn.className = 'cyber-btn mode-btn normal';
                btn.innerText = drill.name;
                btn.onclick = () => startDrill(drill.id);
                container.appendChild(btn);
            });

            showScreen('screen-sub');
        }

        function startDrill(drillId) {
            selectedDrill = drillId;
            velocityLog = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Set Title
            let drillName = "DRILL";
            for (const category in drillData) {
                const found = drillData[category].find(d => d.id === drillId);
                if (found) drillName = found.name;
            }
            document.getElementById('active-drill-text').innerText = drillName;

            showScreen('screen-active');

            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: "start_drill", drill_id: drillId }));
            }
        }

        function endDrill() {
            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: "stop_drill" }));
            }

            const avgVel = velocityLog.length > 0 ? Math.round(velocityLog.reduce((a, b) => a + b, 0) / velocityLog.length) : 0;

            document.getElementById('sum-accuracy').innerText = `${backendAccuracy}%`;
            document.getElementById('sum-streak').innerText = maxStreak;
            document.getElementById('sum-vel').innerText = avgVel;
            document.getElementById('sum-total').innerText = totalShots;

            showScreen('screen-summary');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function emergencyStop() {
            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: "stop_drill" })); 
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            showScreen('screen-level');
        }

        function initWebSocket() {
            // Automatically switch between ws:// (local) and wss:// (internet/ngrok)
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            
            ws.onopen = () => {
                document.getElementById('status').innerText = "WS: Connected";
                document.getElementById('status').style.color = "var(--neon-green)";
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.event === "shot_result" && document.getElementById('screen-active').classList.contains('active')) {
                    drawImpact(data.impact_coords.y, data.impact_coords.z, data.success);
                    if (data.velocity) velocityLog.push(data.velocity);
                    syncStatsWithBackend();
                }
            };

            ws.onclose = () => {
                document.getElementById('status').innerText = "WS: Disconnected";
                document.getElementById('status').style.color = "var(--neon-red)";
                setTimeout(initWebSocket, 2000); 
            };
        }

        function drawImpact(y_mm, z_mm, success) {
            const x_px = (y_mm + 762.5) * scale;
            const y_px = canvas.height - (z_mm * scale);

            ctx.beginPath();
            ctx.arc(x_px, y_px, 6, 0, 2 * Math.PI);
            ctx.fillStyle = success ? 'var(--neon-green)' : 'var(--neon-red)';
            ctx.fill();
            
            ctx.shadowBlur = 10;
            ctx.shadowColor = ctx.fillStyle;
            ctx.fill();
            ctx.shadowBlur = 0; 
        }

        syncStatsWithBackend();
        initWebSocket();
    </script>
</body>
</html>
