<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart TT Trainer Dashboard</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

    <header>
        <h1><span class="branding">IITGN</span> Trainer</h1>
        <div id="status">WS: Disconnected</div>
    </header>

    <div id="screen-level" class="screen active">
        <button class="cyber-btn" onclick="selectLevel('beginner')">Beginner</button>
        <button class="cyber-btn" onclick="selectLevel('intermediate')">Intermediate</button>
        <button class="cyber-btn" onclick="selectLevel('advanced')">Advanced</button>
    </div>

    <div id="screen-sub" class="screen">
        <div id="sub-buttons-container" style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 30px;"></div>
        <button class="cyber-btn danger" style="margin-top: 40px; padding: 20px; font-size: 1.5rem;" onclick="showScreen('screen-level')">Back</button>
    </div>

    <div id="screen-active" class="screen">
        <div class="active-display">
            <div class="pulse-ring"></div>
            <div id="active-drill-text">ACTIVE</div>
            <div class="processing-text">Tracking Systems Online</div>
        </div>

        <canvas id="tt-board" width="610" height="548"></canvas>

        <div id="active-controls">
            <button class="cyber-btn danger" onclick="endDrill()">End & Stats</button>
            <button class="cyber-btn emergency" onclick="emergencyStop()">EMERGENCY STOP (99)</button>
        </div>
    </div>

    <div id="screen-summary" class="screen">
        <h2 class="mode-title">Drill Complete</h2>
        
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-val" id="sum-accuracy">0%</div>
                <div class="stat-label">Hit Accuracy</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="sum-streak">0</div>
                <div class="stat-label">Max Streak</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="sum-vel">0</div>
                <div class="stat-label">Avg Velocity (km/h)</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="sum-total">0</div>
                <div class="stat-label">Total Balls</div>
            </div>
        </div>

        <button class="cyber-btn" onclick="showScreen('screen-level')">Start New Drill</button>
    </div>

    <script src="/dashboard.js"></script>
</body>
</html>
