<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart TT Trainer Dashboard</title>
    <style>
        :root {
            --bg-color: #080808;
            --panel-bg: #111111;
            --iitgn-orange: #FF6600;
            --iitgn-blue: #003366;
            --neon-green: #39ff14;
            --neon-red: #ff073a;
            --text-main: #e0e0e0;
        }

        body, html {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        h1 { margin: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; color: #555;}
        .branding { color: var(--iitgn-orange); font-weight: bold; }

        .screen {
            display: none; 
            width: 100%;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            box-sizing: border-box;
        }

        .screen.active { display: flex; }

        .giant-btn {
            width: 90%;
            max-width: 800px;
            padding: 30px 20px;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: var(--panel-bg);
            color: var(--text-main);
            border: 3px solid var(--iitgn-blue);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 10px 30px rgba(0, 51, 102, 0.2);
        }

        .giant-btn:hover {
            background: var(--iitgn-blue);
            transform: translateY(-5px);
        }

        .giant-btn.danger {
            border-color: var(--neon-red);
            background: rgba(255, 7, 58, 0.1);
        }

        .giant-btn.danger:hover {
            background: var(--neon-red);
            color: white;
        }

        /* Emergency Button Styling */
        .giant-btn.emergency {
            background: #ff0000;
            color: white;
            border-color: #8b0000;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.4);
        }

        .giant-btn.emergency:hover {
            background: #cc0000;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 90%;
            max-width: 800px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 12px;
            border-left: 5px solid var(--iitgn-orange);
            text-align: center;
        }

        .stat-val { font-size: 4rem; font-weight: bold; font-family: monospace; color: white;}
        .stat-label { font-size: 1.2rem; color: #888; text-transform: uppercase; letter-spacing: 1px;}

        #tt-board {
            position: absolute;
            bottom: 50px;
            background: transparent;
            z-index: 10;
        }
        
        #active-btn-container {
            position: absolute;
            top: 50px;
            z-index: 20;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1><span class="branding">IITGN</span> Trainer</h1>
        <div id="status" style="color: #888; font-size: 0.9rem; margin-top: 5px;">WS: Disconnected</div>
    </header>

    <div id="screen-level" class="screen active">
        <button class="giant-btn" onclick="selectLevel('beginner')">Beginner</button>
        <button class="giant-btn" onclick="selectLevel('intermediate')">Intermediate</button>
        <button class="giant-btn" onclick="selectLevel('advanced')">Advanced</button>
    </div>

    <div id="screen-sub" class="screen">
        <div id="sub-buttons-container" style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 30px;"></div>
        <button class="giant-btn danger" style="margin-top: 40px; padding: 20px; font-size: 1.5rem;" onclick="showScreen('screen-level')">Back</button>
    </div>

    <div id="screen-active" class="screen">
        <div id="active-btn-container">
            <button class="giant-btn danger" style="max-width: 400px; font-size: 1.2rem;" onclick="endDrill()">End & Stats</button>
            <button class="giant-btn emergency" style="max-width: 400px; font-size: 1.2rem;" onclick="emergencyStop()">EMERGENCY STOP (99)</button>
        </div>
        <canvas id="tt-board" width="610" height="548"></canvas>
    </div>

    <div id="screen-summary" class="screen">
        <h2 style="font-size: 3rem; margin-bottom: 10px; color: var(--iitgn-orange);">Drill Complete</h2>
        
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-val" id="sum-accuracy">0%</div>
                <div class="stat-label">Hit Accuracy</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="sum-streak">0</div>
                <div class="stat-label">Max Streak</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="sum-vel">0</div>
                <div class="stat-label">Avg Velocity (km/h)</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="sum-total">0</div>
                <div class="stat-label">Total Balls</div>
            </div>
        </div>

        <button class="giant-btn" onclick="showScreen('screen-level')">Start New Drill</button>
    </div>

    <script>
        // --- Drill Configurations (Now using Numeric IDs) ---
        const drillData = {
            beginner: [
                { id: 1, name: "Forehand Counter" },
                { id: 2, name: "Backhand Counter" },
                { id: 3, name: "Basic Push" }
            ],
            intermediate: [
                { id: 4, name: "Topspin Drive" },
                { id: 5, name: "Active Block" },
                { id: 6, name: "Pivot Forehand" }
            ],
            advanced: [
                { id: 7, name: "Falkenberg Drill" },
                { id: 8, name: "Random Topspin" },
                { id: 9, name: "Short Touch" }
            ]
        };

        let ws;
        let selectedDrill = null;
        
        let currentStreak = 0;
        let maxStreak = 0;
        let totalShots = 0;
        let successfulHits = 0;
        let velocityLog = [];

        const canvas = document.getElementById('tt-board');
        const ctx = canvas.getContext('2d');
        const scale = 0.4; 

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function selectLevel(level) {
            const container = document.getElementById('sub-buttons-container');
            container.innerHTML = ""; 
            
            drillData[level].forEach(drill => {
                const btn = document.createElement('button');
                btn.className = 'giant-btn';
                btn.innerText = drill.name;
                // Passes the numeric ID
                btn.onclick = () => startDrill(drill.id);
                container.appendChild(btn);
            });

            showScreen('screen-sub');
        }

        function startDrill(drillId) {
            selectedDrill = drillId;
            currentStreak = 0;
            maxStreak = 0;
            totalShots = 0;
            successfulHits = 0;
            velocityLog = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            showScreen('screen-active');

            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: "start_drill", drill_id: drillId }));
            }
        }

        function endDrill() {
            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: "stop_drill" })); // Backend adds ID 99
            }

            const accuracy = totalShots > 0 ? Math.round((successfulHits / totalShots) * 100) : 0;
            const avgVel = velocityLog.length > 0 ? Math.round(velocityLog.reduce((a, b) => a + b, 0) / velocityLog.length) : 0;

            document.getElementById('sum-accuracy').innerText = `${accuracy}%`;
            document.getElementById('sum-streak').innerText = maxStreak;
            document.getElementById('sum-vel').innerText = avgVel;
            document.getElementById('sum-total').innerText = totalShots;

            showScreen('screen-summary');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function emergencyStop() {
            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: "stop_drill" })); 
            }
            // Skip summary, instantly wipe canvas, and go to main menu
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            showScreen('screen-level');
        }

        function initWebSocket() {
            ws = new WebSocket(`ws://${window.location.host}/ws`);
            
            ws.onopen = () => {
                document.getElementById('status').innerText = "WS: Connected";
                document.getElementById('status').style.color = "var(--neon-green)";
                
                // NEW: Request state immediately after opening connection (Solves Refresh Bug)
                ws.send(JSON.stringify({ action: "get_state" }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.event === "sync_state") {
                    if (data.state.is_running) {
                        totalShots = data.state.total_shots;
                        successfulHits = data.state.successful_hits;
                        currentStreak = data.state.current_streak;
                        maxStreak = data.state.max_streak;
                        velocityLog = data.state.velocity_log;
                        selectedDrill = data.state.drill_id;
                        showScreen('screen-active');
                    }
                }
                else if (data.event === "shot_result" && document.getElementById('screen-active').classList.contains('active')) {
                    totalShots++;
                    if (data.velocity) velocityLog.push(data.velocity);

                    if (data.success) {
                        successfulHits++;
                        currentStreak++;
                        if (currentStreak > maxStreak) maxStreak = currentStreak;
                    } else {
                        currentStreak = 0;
                    }

                    drawImpact(data.impact_coords.y, data.impact_coords.z, data.success);
                }
            };

            ws.onclose = () => {
                document.getElementById('status').innerText = "WS: Disconnected";
                document.getElementById('status').style.color = "var(--neon-red)";
                setTimeout(initWebSocket, 2000); 
            };
        }

        function drawImpact(y_mm, z_mm, success) {
            const x_px = (y_mm + 762.5) * scale;
            const y_px = canvas.height - (z_mm * scale);

            ctx.beginPath();
            ctx.arc(x_px, y_px, 6, 0, 2 * Math.PI);
            ctx.fillStyle = success ? 'var(--neon-green)' : 'var(--neon-red)';
            ctx.fill();
            
            ctx.shadowBlur = 10;
            ctx.shadowColor = ctx.fillStyle;
            ctx.fill();
            ctx.shadowBlur = 0; 
        }

        initWebSocket();
    </script>
</body>
</html>
