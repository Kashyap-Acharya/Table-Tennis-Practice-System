<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IITGN TT Trainer</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1><span class="branding">IITGN</span> SMART TRAINER</h1>
        <div id="status">Offline</div>
    </header>

    <main id="screen-level" class="screen active">
        <h2 class="mode-title">Select Firing Sequence</h2>
        <div class="mode-grid">
            <button class="cyber-btn" onclick="startDrill('fh_normal')">Forehand Normal</button>
            <button class="cyber-btn" onclick="startDrill('fh_spin')">Forehand Spin</button>
            <button class="cyber-btn" onclick="startDrill('bh_normal')">Backhand Normal</button>
            <button class="cyber-btn" onclick="startDrill('bh_spin')">Backhand Spin</button>
        </div>
        <button class="cyber-btn random" onclick="startDrill('random')">Chaos Matrix (Random)</button>
    </main>

    <main id="screen-active" class="screen">
        <div class="telemetry-box">
            <h2 id="active-drill-text">DRILL ACTIVE</h2>
            <div id="live-accuracy">Acc: 0%</div>
        </div>
        <canvas id="tt-board"></canvas>
        <div class="controls">
            <button class="cyber-btn danger" onclick="endDrill()">End Session</button>
        </div>
    </main>

    <main id="screen-summary" class="screen">
        <h2>Session Complete</h2>
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-val" id="sum-accuracy">0%</div>
                <div class="stat-label">Accuracy</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="sum-total">0</div>
                <div class="stat-label">Total Balls</div>
            </div>
        </div>
        <button class="cyber-btn" onclick="showScreen('screen-level')">Return to Menu</button>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
